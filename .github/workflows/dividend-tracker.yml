name: 배당 데이터 업데이트

on:
  schedule:
    - cron: '0 1 * * 1'   # 매주 월요일 오전 10시 KST (UTC 01:00)
  workflow_dispatch:       # 수동 실행
  push:
    paths:
      - 'docs/dividend-tracker/holdings.json'  # holdings 변경 시 자동 실행

permissions:
  contents: write

jobs:
  fetch-dividends:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance pandas

      - name: Fetch dividend data
        run: python scripts/fetch_dividends.py

      - name: Commit data.json
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/dividend-tracker/data.json
          git commit -m "📈 Update dividend data [skip ci]" || echo "No changes to commit"
          git push
