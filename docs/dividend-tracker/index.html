<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>배당 대시보드 — Wonseok's AI Harness</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --bg: #0f1117;
      --card: #1a1d27;
      --card2: #1e2130;
      --border: #2a2d3e;
      --accent: #4f8ef7;
      --green: #34d399;
      --green-dim: rgba(52,211,153,0.15);
      --blue-dim: rgba(79,142,247,0.15);
      --yellow: #fbbf24;
      --purple: #a78bfa;
      --pink: #f472b6;
      --orange: #fb923c;
      --red: #f87171;
      --text: #e2e8f0;
      --muted: #64748b;
      --muted2: #94a3b8;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 40px 16px 80px;
    }

    .container { max-width: 1000px; margin: 0 auto; }

    /* ── Back link ── */
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--muted);
      text-decoration: none;
      font-size: 0.85rem;
      margin-bottom: 28px;
      transition: color 0.15s;
    }
    .back-link:hover { color: var(--text); }

    /* ── Hero ── */
    .hero {
      margin-bottom: 36px;
    }
    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--green);
      background: rgba(52,211,153,0.1);
      border: 1px solid rgba(52,211,153,0.3);
      border-radius: 20px;
      padding: 4px 14px;
      margin-bottom: 14px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .hero h1 {
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #e2e8f0 30%, var(--green) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 6px;
    }
    .hero-meta {
      font-size: 0.8rem;
      color: var(--muted);
    }
    .hero-meta span { color: var(--muted2); }

    /* ── Summary Cards ── */
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
      margin-bottom: 28px;
    }
    .metric-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 20px;
    }
    .metric-label {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 8px;
    }
    .metric-value {
      font-size: 1.5rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      line-height: 1.2;
    }
    .metric-sub {
      font-size: 0.75rem;
      color: var(--muted);
      margin-top: 4px;
    }
    .metric-card.green .metric-value { color: var(--green); }
    .metric-card.blue .metric-value  { color: var(--accent); }
    .metric-card.yellow .metric-value { color: var(--yellow); }
    .metric-card.purple .metric-value { color: var(--purple); }

    /* ── Sections ── */
    .section {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 24px;
      margin-bottom: 20px;
    }
    .section-title {
      font-size: 0.95rem;
      font-weight: 700;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .section-title .badge {
      font-size: 0.7rem;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 10px;
      background: var(--green-dim);
      color: var(--green);
    }
    .section-title .badge.blue {
      background: var(--blue-dim);
      color: var(--accent);
    }

    .chart-wrap {
      position: relative;
      height: 280px;
    }

    /* ── Two-column layout ── */
    .two-col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 20px;
    }

    /* ── Calendar Grid ── */
    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }
    .cal-cell {
      background: var(--card2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 8px;
      text-align: center;
      cursor: default;
      transition: border-color 0.15s;
    }
    .cal-cell.has-dividend { border-color: rgba(52,211,153,0.4); }
    .cal-cell.has-projected { border-color: rgba(79,142,247,0.35); }
    .cal-cell.current-month {
      background: rgba(52,211,153,0.06);
      border-color: rgba(52,211,153,0.6) !important;
    }
    .cal-month {
      font-size: 0.7rem;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 4px;
    }
    .cal-amount {
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 2px;
    }
    .cal-amount.projected { color: var(--accent); }
    .cal-amount.actual    { color: var(--green); }
    .cal-amount.empty     { color: var(--muted); font-weight: 400; font-size: 0.75rem; }
    .cal-tickers {
      font-size: 0.62rem;
      color: var(--muted);
      line-height: 1.4;
      margin-top: 2px;
    }

    /* ── Holdings Table ── */
    .table-wrap { overflow-x: auto; }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.85rem;
    }
    thead tr {
      border-bottom: 1px solid var(--border);
    }
    th {
      text-align: left;
      padding: 8px 12px;
      font-size: 0.72rem;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      white-space: nowrap;
    }
    td {
      padding: 10px 12px;
      border-bottom: 1px solid rgba(42,45,62,0.6);
      vertical-align: middle;
    }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(255,255,255,0.02); }
    .ticker-badge {
      display: inline-block;
      font-size: 0.75rem;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 8px;
      background: var(--blue-dim);
      color: var(--accent);
    }
    .ticker-badge.kr {
      background: rgba(167,139,250,0.15);
      color: var(--purple);
    }
    .freq-badge {
      display: inline-block;
      font-size: 0.68rem;
      font-weight: 600;
      padding: 2px 7px;
      border-radius: 8px;
      background: rgba(100,116,139,0.15);
      color: var(--muted2);
    }
    .text-right { text-align: right; }
    .text-green { color: var(--green); font-weight: 700; }
    .text-muted { color: var(--muted); }

    /* ── Legend ── */
    .legend {
      display: flex;
      gap: 16px;
      margin-top: 12px;
      font-size: 0.75rem;
      color: var(--muted);
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 3px;
      flex-shrink: 0;
    }

    /* ── Donut wrap ── */
    .donut-wrap {
      display: flex;
      gap: 20px;
      align-items: center;
    }
    .donut-chart-area {
      position: relative;
      width: 180px;
      height: 180px;
      flex-shrink: 0;
    }
    .donut-legend {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 8px;
      font-size: 0.8rem;
    }
    .donut-legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .donut-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .donut-legend-label { flex: 1; color: var(--muted2); }
    .donut-legend-pct { font-weight: 700; }

    /* ── Loading / Error ── */
    .state-box {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
    }
    .state-box .state-icon { font-size: 3rem; margin-bottom: 16px; }
    .state-box h2 { font-size: 1.2rem; color: var(--text); margin-bottom: 10px; }
    .state-box p { font-size: 0.9rem; line-height: 1.6; max-width: 440px; margin: 0 auto 20px; }
    .code-block {
      display: inline-block;
      background: var(--card2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 18px;
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 0.8rem;
      text-align: left;
      color: var(--green);
      line-height: 1.7;
    }

    /* ── Footer ── */
    .page-footer {
      text-align: center;
      margin-top: 56px;
      color: var(--muted);
      font-size: 0.8rem;
      line-height: 1.8;
    }
    .page-footer a { color: var(--accent); text-decoration: none; }
    .page-footer a:hover { text-decoration: underline; }

    @media (max-width: 700px) {
      .cards-grid { grid-template-columns: repeat(2, 1fr); }
      .two-col { grid-template-columns: 1fr; }
      .calendar-grid { grid-template-columns: repeat(3, 1fr); }
      .donut-wrap { flex-direction: column; align-items: flex-start; }
    }
    @media (max-width: 400px) {
      .cards-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<div class="container">

  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:28px">
    <a class="back-link" href="../" style="margin-bottom:0">← 돌아가기</a>
    <a class="back-link" href="./manage.html" style="margin-bottom:0;color:var(--purple)">⚙️ 종목 관리</a>
  </div>

  <div class="hero">
    <div class="hero-badge">📈 Dividend Tracker</div>
    <h1>배당 대시보드</h1>
    <div class="hero-meta" id="heroMeta">데이터 로딩 중...</div>

</div>

<script>
// ── Constants ──────────────────────────────────────────────────────────────
const CHART_COLORS = [
  '#4f8ef7', '#34d399', '#fbbf24', '#a78bfa',
  '#f472b6', '#fb923c', '#38bdf8', '#86efac',
  '#fdba74', '#c084fc',
];

const FREQ_LABEL = {
  monthly: '월배당',
  quarterly: '분기배당',
  'semi-annual': '반기배당',
  annual: '연배당',
  unknown: '-',
};

const MONTH_KO = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];

// ── Helpers ────────────────────────────────────────────────────────────────
function fmtKRW(val) {
  if (val === 0) return '-';
  if (val >= 1_000_000) return `${(val / 1_000_000).toFixed(1)}백만원`;
  if (val >= 10_000)    return `${Math.round(val / 1_000).toLocaleString('ko-KR')}천원`;
  return `${Math.round(val).toLocaleString('ko-KR')}원`;
}

function fmtKRWFull(val) {
  return `${Math.round(val).toLocaleString('ko-KR')}원`;
}

// ── Main ───────────────────────────────────────────────────────────────────
async function loadData() {
  try {
    const res = await fetch('./data.json');
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    return await res.json();
  } catch (e) {
    return null;
  }
}

function renderError() {
  document.getElementById('mainContent').innerHTML = `
    <div class="section">
      <div class="state-box">
        <div class="state-icon">📋</div>
        <h2>데이터 파일이 없습니다</h2>
        <p>
          <code>holdings.json</code>에 보유 종목을 입력하고 GitHub Actions 워크플로우를 실행하면
          자동으로 배당 데이터가 수집됩니다.
        </p>
        <a href="./manage.html" style="display:inline-flex;align-items:center;gap:8px;padding:10px 20px;background:rgba(167,139,250,0.15);border:1px solid rgba(167,139,250,0.3);border-radius:10px;color:var(--purple);text-decoration:none;font-weight:600;font-size:0.9rem;margin-bottom:14px">
          ⚙️ 종목 관리 페이지에서 추가하기
        </a>
        <div class="code-block">
          1. 위 링크에서 종목 입력 → holdings.json 다운로드<br>
          2. GitHub에 커밋 → Actions 자동 실행<br>
          3. 또는: python3 scripts/fetch_dividends.py
        </div>
      </div>
    </div>`;
}

function buildMonthlyChartData(monthlySummary) {
  const today = new Date();
  const months = [];
  // 12 months back + current + 11 months ahead = 24
  for (let i = -12; i <= 11; i++) {
    const d = new Date(today.getFullYear(), today.getMonth() + i, 1);
    const key = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
    const label = `${d.getFullYear() === today.getFullYear() ? '' : d.getFullYear() % 100 + '/'}${d.getMonth() + 1}월`;
    const bucket = monthlySummary[key] || { actual_krw: 0, projected_krw: 0 };
    months.push({ key, label, ...bucket });
  }
  return months;
}

function renderMonthlyChart(months) {
  const ctx = document.getElementById('monthlyChart').getContext('2d');
  const today = new Date();
  const currentKey = `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}`;

  new Chart(ctx, {
    type: 'bar',
    data: {
      labels: months.map(m => m.label),
      datasets: [
        {
          label: '실수령액 (확정)',
          data: months.map(m => m.actual_krw || null),
          backgroundColor: 'rgba(52,211,153,0.7)',
          borderColor: 'rgba(52,211,153,0.9)',
          borderWidth: 1,
          borderRadius: 4,
        },
        {
          label: '실수령액 (예상)',
          data: months.map(m => m.projected_krw || null),
          backgroundColor: 'rgba(79,142,247,0.5)',
          borderColor: 'rgba(79,142,247,0.7)',
          borderWidth: 1,
          borderDash: [4, 2],
          borderRadius: 4,
        },
      ],
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#1e2130',
          borderColor: '#2a2d3e',
          borderWidth: 1,
          titleColor: '#e2e8f0',
          bodyColor: '#94a3b8',
          padding: 10,
          callbacks: {
            label: ctx => {
              const v = ctx.raw;
              if (!v) return null;
              return `  ${ctx.dataset.label}: ${fmtKRWFull(v)}`;
            },
          },
        },
      },
      scales: {
        x: {
          stacked: false,
          grid: { color: 'rgba(42,45,62,0.5)' },
          ticks: { color: '#64748b', font: { size: 10 } },
        },
        y: {
          grid: { color: 'rgba(42,45,62,0.5)' },
          ticks: {
            color: '#64748b',
            font: { size: 10 },
            callback: v => fmtKRW(v),
          },
        },
      },
    },
  });
}

function renderDonutChart(stocks) {
  const ctx = document.getElementById('donutChart').getContext('2d');

  // Annual after-tax KRW per ticker
  const entries = Object.entries(stocks)
    .map(([ticker, data]) => {
      const annualHistory = data.dividends_history
        .filter(d => d.date.startsWith(new Date().getFullYear().toString()))
        .reduce((s, d) => s + d.after_tax_krw, 0);
      const annualProjected = data.dividends_projected
        .filter(d => d.date.startsWith(new Date().getFullYear().toString()))
        .reduce((s, d) => s + d.after_tax_krw, 0);
      return { ticker, name: data.name, total: annualHistory + annualProjected };
    })
    .filter(e => e.total > 0)
    .sort((a, b) => b.total - a.total);

  const grandTotal = entries.reduce((s, e) => s + e.total, 0);

  new Chart(ctx, {
    type: 'doughnut',
    data: {
      labels: entries.map(e => e.ticker),
      datasets: [{
        data: entries.map(e => e.total),
        backgroundColor: CHART_COLORS.slice(0, entries.length),
        borderColor: '#1a1d27',
        borderWidth: 3,
        hoverBorderWidth: 3,
      }],
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      cutout: '65%',
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#1e2130',
          borderColor: '#2a2d3e',
          borderWidth: 1,
          callbacks: {
            label: ctx => {
              const pct = grandTotal ? (ctx.raw / grandTotal * 100).toFixed(1) : 0;
              return `  ${fmtKRWFull(ctx.raw)} (${pct}%)`;
            },
          },
        },
      },
    },
  });

  // Custom legend
  const legendEl = document.getElementById('donutLegend');
  legendEl.innerHTML = entries.map((e, i) => {
    const pct = grandTotal ? (e.total / grandTotal * 100).toFixed(1) : '0.0';
    return `
      <div class="donut-legend-item">
        <div class="donut-dot" style="background:${CHART_COLORS[i]}"></div>
        <span class="donut-legend-label">${e.ticker}</span>
        <span class="donut-legend-pct" style="color:${CHART_COLORS[i]}">${pct}%</span>
      </div>`;
  }).join('');
}

function renderCalendar(stocks, monthlySummary) {
  const today = new Date();
  const year = today.getFullYear();
  const currentMonth = today.getMonth() + 1;
  const el = document.getElementById('calendarGrid');

  // Build per-month ticker list
  const monthTickers = {};
  for (const [ticker, data] of Object.entries(stocks)) {
    const allDivs = [
      ...data.dividends_history.map(d => ({ ...d, projected: false })),
      ...data.dividends_projected.map(d => ({ ...d, projected: true })),
    ];
    for (const div of allDivs) {
      if (!div.date.startsWith(String(year))) continue;
      const m = parseInt(div.date.slice(5, 7));
      if (!monthTickers[m]) monthTickers[m] = [];
      if (!monthTickers[m].find(t => t.ticker === ticker)) {
        monthTickers[m].push({ ticker, projected: div.projected });
      }
    }
  }

  el.innerHTML = MONTH_KO.map((name, idx) => {
    const m = idx + 1;
    const key = `${year}-${String(m).padStart(2, '0')}`;
    const bucket = monthlySummary[key] || { actual_krw: 0, projected_krw: 0 };
    const actual = bucket.actual_krw || 0;
    const projected = bucket.projected_krw || 0;
    const tickers = monthTickers[m] || [];

    const isCurrent = m === currentMonth;
    const hasActual = actual > 0;
    const hasProjected = projected > 0;

    let cellClass = 'cal-cell';
    if (isCurrent) cellClass += ' current-month';
    else if (hasActual) cellClass += ' has-dividend';
    else if (hasProjected) cellClass += ' has-projected';

    let amountHtml = '<span class="cal-amount empty">—</span>';
    if (hasActual && hasProjected) {
      amountHtml = `<span class="cal-amount actual">${fmtKRW(actual)}</span><br><span class="cal-amount projected" style="font-size:0.72rem">+${fmtKRW(projected)} 예상</span>`;
    } else if (hasActual) {
      amountHtml = `<span class="cal-amount actual">${fmtKRW(actual)}</span>`;
    } else if (hasProjected) {
      amountHtml = `<span class="cal-amount projected">${fmtKRW(projected)}</span>`;
    }

    const tickerHtml = tickers.length
      ? `<div class="cal-tickers">${tickers.map(t => t.ticker).join(' · ')}</div>`
      : '';

    return `
      <div class="${cellClass}">
        <div class="cal-month">${name}</div>
        ${amountHtml}
        ${tickerHtml}
      </div>`;
  }).join('');
}

function renderHoldingsTable(stocks, exchangeRate) {
  const tbody = document.getElementById('holdingsTbody');
  const rows = Object.entries(stocks).map(([ticker, data]) => {
    const today = new Date();
    const yearStr = String(today.getFullYear());

    const annual = [
      ...data.dividends_history.filter(d => d.date.startsWith(yearStr)),
      ...data.dividends_projected.filter(d => d.date.startsWith(yearStr)),
    ].reduce((s, d) => s + d.after_tax_krw, 0);

    const lastDiv = [...data.dividends_history].sort((a, b) => b.date.localeCompare(a.date))[0];
    const nextDiv = [...data.dividends_projected].sort((a, b) => a.date.localeCompare(b.date))[0];

    const isKR = data.market === 'KR';

    return `
      <tr>
        <td><span class="ticker-badge ${isKR ? 'kr' : ''}">${ticker}</span></td>
        <td>${data.name || '-'}</td>
        <td style="text-align:center">
          <span class="freq-badge">${FREQ_LABEL[data.frequency] || '-'}</span>
        </td>
        <td class="text-right">${data.shares.toLocaleString('ko-KR')}</td>
        <td class="text-right">${lastDiv ? lastDiv.date : '-'}</td>
        <td class="text-right">${nextDiv ? nextDiv.date : '-'}</td>
        <td class="text-right ${annual > 0 ? 'text-green' : 'text-muted'}">
          ${annual > 0 ? fmtKRWFull(annual) : '-'}
        </td>
      </tr>`;
  });

  tbody.innerHTML = rows.join('');
}

function renderAll(data) {
  const { summary, stocks, monthly_summary: monthlySummary, updated, exchange_rate } = data;

  // Hero meta
  const updatedDate = new Date(updated);
  document.getElementById('heroMeta').innerHTML =
    `마지막 업데이트: <span>${updatedDate.toLocaleString('ko-KR')}</span> &nbsp;·&nbsp; USD/KRW: <span>${exchange_rate.USDKRW.toLocaleString('ko-KR')}원</span>`;

  const html = `
    <!-- Summary Cards -->
    <div class="cards-grid">
      <div class="metric-card green">
        <div class="metric-label">올해 수령액 (YTD)</div>
        <div class="metric-value">${fmtKRW(summary.ytd_total_krw)}</div>
        <div class="metric-sub">세후 실수령액</div>
      </div>
      <div class="metric-card blue">
        <div class="metric-label">연간 예상 수령액</div>
        <div class="metric-value">${fmtKRW(summary.expected_annual_krw)}</div>
        <div class="metric-sub">${new Date().getFullYear()}년 기준</div>
      </div>
      <div class="metric-card yellow">
        <div class="metric-label">이번 달 예상</div>
        <div class="metric-value">${fmtKRW(summary.this_month_krw)}</div>
        <div class="metric-sub">${MONTH_KO[new Date().getMonth()]}</div>
      </div>
      <div class="metric-card purple">
        <div class="metric-label">보유 종목</div>
        <div class="metric-value">${summary.total_tickers}</div>
        <div class="metric-sub">배당주 / ETF</div>
      </div>
    </div>

    <!-- Monthly Trend -->
    <div class="section">
      <div class="section-title">
        월별 배당 실수령액 추이
        <span class="badge">24개월</span>
      </div>
      <div class="chart-wrap">
        <canvas id="monthlyChart"></canvas>
      </div>
      <div class="legend">
        <div class="legend-item">
          <div class="legend-dot" style="background:rgba(52,211,153,0.7)"></div>
          <span>확정 배당</span>
        </div>
        <div class="legend-item">
          <div class="legend-dot" style="background:rgba(79,142,247,0.5)"></div>
          <span>예상 배당 (최근 패턴 기반)</span>
        </div>
      </div>
    </div>

    <!-- Donut + Calendar -->
    <div class="two-col">
      <div class="section">
        <div class="section-title">
          종목별 배당 비중
          <span class="badge">${new Date().getFullYear()}년</span>
        </div>
        <div class="donut-wrap">
          <div class="donut-chart-area">
            <canvas id="donutChart"></canvas>
          </div>
          <div class="donut-legend" id="donutLegend"></div>
        </div>
      </div>

      <div class="section">
        <div class="section-title">
          배당 캘린더
          <span class="badge blue">${new Date().getFullYear()}년</span>
        </div>
        <div class="calendar-grid" id="calendarGrid"></div>
        <div class="legend" style="margin-top:10px">
          <div class="legend-item">
            <div class="legend-dot" style="background:var(--green)"></div>
            <span>확정</span>
          </div>
          <div class="legend-item">
            <div class="legend-dot" style="background:var(--accent)"></div>
            <span>예상</span>
          </div>
        </div>
      </div>
    </div>

    <!-- Holdings Table -->
    <div class="section">
      <div class="section-title">보유 종목 상세</div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>티커</th>
              <th>종목명</th>
              <th style="text-align:center">배당주기</th>
              <th class="text-right">보유수량</th>
              <th class="text-right">최근 배당일</th>
              <th class="text-right">다음 예상일</th>
              <th class="text-right">연간 예상 수령액</th>
            </tr>
          </thead>
          <tbody id="holdingsTbody"></tbody>
        </table>
      </div>
    </div>
  `;

  document.getElementById('mainContent').innerHTML = html;

  // Render charts
  const months = buildMonthlyChartData(monthlySummary);
  renderMonthlyChart(months);
  renderDonutChart(stocks);
  renderCalendar(stocks, monthlySummary);
  renderHoldingsTable(stocks, exchange_rate);
}

// ── Bootstrap ──────────────────────────────────────────────────────────────
(async () => {
  const data = await loadData();
  if (!data) {
    renderError();
    return;
  }
  renderAll(data);
})();
</script>
</body>
</html>
